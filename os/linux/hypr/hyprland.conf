# Hyprland Configuration
# https://wiki.hypr.land/

# =============================================================================
# Variables - Customize these to change defaults
# =============================================================================
$mod = SUPER
$terminal = kitty
$launcher = ~/.config/hypr/scripts/rofi_launcher
$locker = hyprlock
$logout = ~/.config/hypr/scripts/rofi_powermenu
$filemanager = thunar

# Directory
$DIR = ~/.config/hypr

# =============================================================================
# Source Modular Configs
# =============================================================================
source = $DIR/config.d/*

# =============================================================================
# Startup Applications:
# =============================================================================
exec-once = hypridle --config $DIR/hypridle.conf
exec-once = hyprsunset
exec-once = hyprpaper
exec-once = $DIR/scripts/startup
exec-once = $DIR/scripts/monitor_listener

# hyprwhspr - Toggle mode (added by hyprwhspr setup)
# Press once to start, press again to stop
bindd = SUPER ALT, Z, Speech-to-text, exec, /usr/lib/hyprwhspr/config/hyprland/hyprwhspr-tray.sh record
