# Hyprland Key Bindings
# Vim-style navigation with HJKL

# =============================================================================
# Window Focus (vim-style)
# =============================================================================
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# =============================================================================
# Move Windows
# =============================================================================
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# =============================================================================
# Resize Windows
# =============================================================================
bind = $mod CTRL, H, resizeactive, -20 0
bind = $mod CTRL, L, resizeactive, 20 0
bind = $mod CTRL, K, resizeactive, 0 -20
bind = $mod CTRL, J, resizeactive, 0 20

# =============================================================================
# Core Applications
# =============================================================================
bind = $mod, Return, exec, $terminal
bind = $mod, B, exec, firefox
bind = $mod, D, exec, pkill -x rofi || $launcher
bind = $mod, C, exec, pkill -x rofi || rofi -show calc -modi calc -no-show-match -no-sort
bind = $mod, E, exec, $filemanager

# =============================================================================
# Workspaces
# =============================================================================
# Laptop workspaces 1-5: native dispatchers
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

# External monitor workspaces 6-10: wrapper ensures correct monitor
bind = $mod, 6, exec, ~/.config/hypr/scripts/workspace_action switch 6
bind = $mod, 7, exec, ~/.config/hypr/scripts/workspace_action switch 7
bind = $mod, 8, exec, ~/.config/hypr/scripts/workspace_action switch 8
bind = $mod, 9, exec, ~/.config/hypr/scripts/workspace_action switch 9
bind = $mod, 0, exec, ~/.config/hypr/scripts/workspace_action switch 10

# Move window to laptop workspaces 1-5: native
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Move window to external workspaces 6-10: wrapper ensures correct monitor
bind = $mod SHIFT, 6, exec, ~/.config/hypr/scripts/workspace_action move 6
bind = $mod SHIFT, 7, exec, ~/.config/hypr/scripts/workspace_action move 7
bind = $mod SHIFT, 8, exec, ~/.config/hypr/scripts/workspace_action move 8
bind = $mod SHIFT, 9, exec, ~/.config/hypr/scripts/workspace_action move 9
bind = $mod SHIFT, 0, exec, ~/.config/hypr/scripts/workspace_action move 10

# =============================================================================
# Window State
# =============================================================================
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod SHIFT, F, togglefloating
# bind = $mod, T, togglesplit

# =============================================================================
# Session
# =============================================================================
bind = $mod SHIFT, X, exec, $logout

# =============================================================================
# Screenshots
# =============================================================================
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim ~/Pictures/Screenshots/$(date +%F_%T).png

# =============================================================================
# Media Keys
# =============================================================================
bindle = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindle = , XF86AudioLowerVolume, exec, pamixer -d 5
bindl = , XF86AudioMute, exec, pamixer -t
bindle = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# =============================================================================
# Mouse Bindings
# =============================================================================
bindm = $mod SHIFT, mouse:272, movewindow
bindm = $mod SHIFT, mouse:273, resizewindow

# =============================================================================
# Special Workspace (Scratchpad)
# =============================================================================
bind = $mod, grave, togglespecialworkspace
bind = $mod SHIFT, grave, movetoworkspace, special

# =============================================================================
# Misc
# =============================================================================
bind = $mod, Tab, cyclenext
bind = $mod SHIFT, Tab, cyclenext, prev
bind = $mod, S, exec, ~/.config/hypr/scripts/rofi_launcher
bind = $mod SHIFT, W, exec, ~/.config/hypr/theme/theme.sh --pywal-select

# =============================================================================
# VM Passthrough (Super+F10 to send all keys to VM, again to exit)
# =============================================================================
bind = $mod SHIFT, P, submap, passthrough
submap = passthrough
bind = $mod SHIFT, P, submap, reset
submap = reset
