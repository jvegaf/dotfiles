# Hyprland Theme Variables
# Catppuccin Mocha color scheme

# Decoration
$hypr_border_size        = 2
$hypr_gaps_in            = 05
$hypr_gaps_out           = 10
$hypr_gaps_ws            = -20
$hypr_rounding           = 12
$hypr_active_opacity     = 1.0
$hypr_inactive_opacity   = 0.7
$hypr_fullscreen_opacity = 1.0
$hypr_blur_enabled       = true
$hypr_blur_size          = 2
$hypr_blur_pass          = 2

# Windows
$gradient_angle                   = 45deg
$active_border_col_1              = 0xFF145D81
$active_border_col_2              = 0xFF135170
$inactive_border_col_1            = 0xFF0a1e1d
$inactive_border_col_2            = 0xFF003434
$active_shadow_col                = 0x66000000
$inactive_shadow_col              = 0x66000000

# Groups
$groupbar_font_family             = RobotoMono Nerd Font
$groupbar_font_size               = 12
$group_border_active_col          = 0xFF145D81
$group_border_inactive_col        = 0xFF0a1e1d
$group_border_locked_active_col   = 0xFF135170
$group_border_locked_inactive_col = 0xFF0a1e1d
$groupbar_text_color_active       = 0xFF000101
$groupbar_text_color_inactive     = 0xFF86b7c3

# Misc
$notifycmd = notify-send -h string:x-canonical-private-synchronous:hypr-cfg -u low
