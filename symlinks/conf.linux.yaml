    ~/.fonts: fonts
    ~/.config/FreeCAD: os/linux/FreeCAD
    ~/.config/OrcaSlicer : os/linux/OrcaSlicer
    ~/.config/alacritty: os/linux/alacritty
    ~/.config/btop: os/linux/btop
    ~/.config/dunst : os/linux/dunst
    ~/.config/fastfetch: os/linux/fastfetch
    ~/.config/ghostty: os/linux/ghostty
    ~/.config/i3: os/linux/i3
    ~/.config/hypr: os/linux/hypr
    ~/.config/mako: os/linux/mako
    ~/.config/wlogout: os/linux/wlogout
    ~/.config/kicad: os/linux/kicad
    ~/.config/kitty: os/linux/kitty
    ~/.config/lazydocker: os/linux/lazydocker
    ~/.config/lazygit: os/linux/lazygit
    ~/.config/mise: os/linux/mise
    ~/.config/opencode: os/linux/opencode
    ~/.config/picom : os/linux/picom
    ~/.config/polybar : os/linux/polybar
    ~/.config/ranger: os/linux/ranger
    ~/.config/rofi : os/linux/rofi
    ~/.config/starship: os/linux/starship
    ~/.config/tmux : os/linux/tmux
    ~/.config/yazi: os/linux/yazi
    ~/.config/waybar: os/linux/waybar
    ~/.config/zed: os/linux/zed
